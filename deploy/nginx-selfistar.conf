# Nginx reverse proxy for SelfiStar Iraq (full stack: SPA + /api)
# Install: sudo cp deploy/nginx-selfistar.conf /etc/nginx/sites-available/selfistar
# Enable:  sudo ln -sf /etc/nginx/sites-available/selfistar /etc/nginx/sites-enabled/
# SSL:     sudo certbot --nginx -d aiselfiesuperstar.com -d www.aiselfiesuperstar.com
# Test:    sudo nginx -t && sudo systemctl reload nginx

upstream selfistar_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name aiselfiesuperstar.com www.aiselfiesuperstar.com;

    client_max_body_size 20M;

    location / {
        proxy_pass http://selfistar_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
