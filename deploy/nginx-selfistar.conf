# SelfiStar Iraq – nginx (HTTP + HTTPS → Node on port 3001)
#
# Install on server:
#   sudo cp deploy/nginx-selfistar.conf /etc/nginx/sites-available/selfistar
#   sudo ln -sf /etc/nginx/sites-available/selfistar /etc/nginx/sites-enabled/selfistar
#
# Disable other site configs that use this domain (e.g. AiGameopedia):
#   ls /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default
#   sudo rm /etc/nginx/sites-enabled/vasnumero   # if present – adjust name
#
# SSL (first time or renew):
#   sudo certbot --nginx -d aiselfiesuperstar.com -d www.aiselfiesuperstar.com
#
# Test & reload:
#   sudo nginx -t && sudo systemctl reload nginx

upstream selfistar_app {
    server 127.0.0.1:3001;
    keepalive 32;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name aiselfiesuperstar.com www.aiselfiesuperstar.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → SelfiStar (port 3001)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aiselfiesuperstar.com www.aiselfiesuperstar.com;

    ssl_certificate /etc/letsencrypt/live/aiselfiesuperstar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiselfiesuperstar.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://selfistar_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}
